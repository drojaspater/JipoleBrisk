[dependencies]
openssl = ">=3, <3.6"
libstdcxx = ">=3.4,<15.0"
uv = ">=0.4"
libstdcxx-ng = ">=3.4,<15.0"
pandas = "<2"
numpy = ">=1.24, <2.0"

    [dependencies.python]
    channel = "conda-forge"
    build = "*cp*"
    version = ">=3.10,!=3.14.0,!=3.14.1,<4, >=3.6,<=3.12"

[project]
name = ".CondaPkg"
platforms = ["linux-64"]
channels = ["conda-forge"]
channel-priority = "strict"
description = "automatically generated by CondaPkg.jl"

[pypi-dependencies]
ehtim = ">=1.2.10, <2.0"
numpy = ">=1.24, <2.0"
setuptools = "*"
